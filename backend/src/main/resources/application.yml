server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      # Flyway es el dueño del esquema; Hibernate no lo modifica.
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

app:
  cors:
    # En EasyPanel se setea con la URL del frontend. Por defecto permite todo (solo para el skeleton).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  jwt:
    expiration-hours: ${JWT_EXPIRATION_HOURS:12}
